# GitHub Pages への自動デプロイ
#
# master / main への push、または Actions の手動実行で
# ビルド(型チェック込み)→ dist/ を GitHub Pages に公開する。
#
# 事前準備(GitHub 上で一度だけ):
#   Settings → Pages → Build and deployment → Source を
#   "GitHub Actions" に設定する。
name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch: {}

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る(古い実行は中断)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
